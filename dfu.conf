# --- Software-triggered USB firmware upgrade (Path A: reset to BOOTSEL) ---
# Opt-in fragment. Add to EXTRA_CONF_FILE on a normal (bootloader-less) build:
#   west build -b rpi_pico/rp2040/w -d build_dfu -- \
#       -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CONF_FILE="wifi.conf;dfu.conf"
# Default builds never include this file.
#
# Compiles src/dfu/: a shell `dfu` / UDP `DFU` / A+Y button-hold calls
# dfu_enter_recovery(), which uses the RP2040 bootrom reset_usb_boot() to drop
# straight into the USB mask-ROM bootloader (BOOTSEL). Upgrade = drag a .uf2 /
# `picotool load`. No MCUboot, no flash repartition, no signing, no reboot dance.
CONFIG_APP_USB_DFU=y

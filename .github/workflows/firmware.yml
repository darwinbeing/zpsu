name: GenFirmware

on:
  workflow_dispatch:
    inputs:
      zephyr_tag:
        description: "Zephyr Tag"
        required: true
        default: "v4.4.0"
        type: string
      version:
        description: "Release Version"
        required: true
        default: "1.0"
        type: string
      ovp_scale_factor:
        description: "OVP voltage scaling factor (float/int)"
        required: true
        default: "0.856"
      text:
        description: "Release Text"
        required: true
        default: "This is my release text"
        type: string
      prerelease:
        description: "Release as Prerelease"
        required: true
        default: true
        type: boolean

jobs:
  build:
    permissions:
      contents: write  # for actions/upload-release-asset to upload release asset
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gcc: ['13.2.Rel1']
        # gcc: ['10-2020-q4', 'latest']
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # Zephyr v4.4.0 requires Python >= 3.12
      - name: Install GNU Arm Embedded Toolchain - ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ matrix.gcc }}
          path-env-var: ARM_NONE_EABI_GCC_PATH
      - name: The path will be exported to that environmental variable name
        run: echo "The output path is $ARM_NONE_EABI_GCC_PATH"
      - name: Calculate final release text
        id: calc_text
        run: |
          OVP=${{ github.event.inputs.ovp_scale_factor }}
          PSU_OUTPUT=12.3
          RESULT=$(echo "$PSU_OUTPUT / $OVP" | bc -l)
          RESULT=$(printf "%.2f" $RESULT)
          FINAL_TEXT="This is my release text, PSU output voltage: ${RESULT}V"
          echo "Final text: $FINAL_TEXT"
          echo "text=$FINAL_TEXT" >> $GITHUB_OUTPUT
      - name: Create Firmware Package
        run: |
          echo "Building Firmware"
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          # brew install ninja ccache dtc
          sudo apt update
          sudo apt install -y ninja-build ccache device-tree-compiler
          pip install west
          west init --mr "${{ inputs.zephyr_tag }}" zephyrproject
          cd zephyrproject
          west update
          # Install Zephyr's Python deps BEFORE fetching blobs: `west blobs` needs
          # `requests` (its http/git_lfs fetchers) and `jsonschema` (blob manifest
          # validation). Installing them only afterwards fails the blob fetch with
          # "No module named 'requests'" / "Missing jsonschema dependency" (the
          # GitHub runner image no longer pre-provides them).
          pip install -r zephyr/scripts/requirements.txt
          # WiFi/AP (Pico W) images need the AIROC CYW43439 firmware blob.
          # `west blobs fetch` pulls a large set of Infineon blobs from raw
          # github URLs that intermittently return 504; retry (it only re-fetches
          # the blobs still missing) before failing the job.
          blobs_ok=0
          for attempt in 1 2 3 4 5; do
            if west blobs fetch hal_infineon; then blobs_ok=1; break; fi
            echo "blob fetch attempt $attempt failed (likely transient 504); retrying in 20s..."
            sleep 20
          done
          [ "$blobs_ok" = 1 ] || { echo "ERROR: west blobs fetch failed after 5 attempts"; exit 1; }
          cd ..

          # Apply the ST7789 GRAM-clear driver patch (fixes power-up screen
          # garbage). The fix lives in the Zephyr display driver, which is
          # fetched fresh by `west update` above, so it must be re-applied on
          # every CI run. Fails the job if it no longer applies (e.g. the
          # zephyr_tag changed and the driver diverged) so the patch gets fixed.
          echo "Applying st7789v_clear_gram.patch to Zephyr"
          git -C zephyrproject/zephyr apply --verbose "$GITHUB_WORKSPACE/patches/st7789v_clear_gram.patch"

          # Apply the RP2040 flash ram-func fix (Zephyr #68728, root cause): three
          # helpers in hal_rpi_pico hardware_flash/flash.c (flash_wait_ready,
          # flash_enable_write, flash_put_cmd_addr) are 'static inline' without
          # __no_inline_not_in_flash_func; when the compiler does not inline them
          # they land in XIP flash and get called by flash_write_partial_internal
          # while XIP is disabled -> instruction-fetch HardFault -> double fault
          # -> CPU lockup (freezes on the first NVS/Settings credential write).
          # Force them into RAM. Needed by the WiFi/AP runtime-cred store.
          echo "Applying rp2040_flash_ramfunc.patch to hal_rpi_pico"
          git -C zephyrproject/modules/hal/rpi_pico apply --verbose "$GITHUB_WORKSPACE/patches/rp2040_flash_ramfunc.patch"

          # Apply the CYW43439 SoftAP fix: the whd-expansion (WHD 3.3.3) firmware
          # rejects the "chanspec" iovar in AP mode with WHD_WLAN_BADCHAN (2020),
          # so SoftAP never comes up on v4.4.0. Set the AP channel via the plain
          # WLC_SET_CHANNEL ioctl instead (as the Pico SDK cyw43-driver does).
          # Patches the hal_infineon module (re-fetched by `west update` above),
          # NOT the zephyr tree. Only affects the WiFi/AP builds.
          echo "Applying cyw43439_ap_set_channel.patch to hal_infineon"
          git -C zephyrproject/modules/hal/infineon apply --verbose "$GITHUB_WORKSPACE/patches/cyw43439_ap_set_channel.patch"

          arm_none_eabi_gcc_path=${ARM_NONE_EABI_GCC_PATH%/*}
          export ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb
          export GNUARMEMB_TOOLCHAIN_PATH="$arm_none_eabi_gcc_path"

          source zephyrproject/zephyr/zephyr-env.sh

          # Host unit test (no Zephyr): the DFU UDP command matcher. Fast gate.
          cc -std=c11 -Wall -I src/dfu tests/dfu_cmd/test_dfu_cmd.c src/dfu/dfu_cmd.c -o /tmp/tdfu && /tmp/tdfu

          west build -b rpi_pico -d build_lcd1 -- -DCONFIG_PICO_DISPLAY_PACK=y -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          west build -b rpi_pico -d build_lcd2 -- -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          west build -b rpi_pico2/rp2350a/m33 -d build_lcd3 -- -DCONFIG_PICO_DISPLAY_PACK=y -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          west build -b rpi_pico2/rp2350a/m33 -d build_lcd4 -- -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          # Pico W (RP2040) WiFi STA + SoftAP. No wifi_creds.h/ap_creds.h in CI ->
          # built-in defaults (manual `wifi connect` / zpsu-<MAC4> AP); no secrets baked in.
          west build -b rpi_pico/rp2040/w -d build_wifi -- -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CONF_FILE=wifi.conf -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          west build -b rpi_pico/rp2040/w -d build_ap -- -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CONF_FILE=ap.conf -DEXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
          # MCUboot USB-DFU upgrade build (opt-in sysbuild + */mcuboot variant): a
          # build-only gate proving the upgrade image + bootloader still build. App
          # overlays/conf are namespaced (-Dzpsu_mon_*) because a sysbuild child does
          # not see BOARD/EXTRA_CONF_FILE before find_package. imgtool signs the app.
          pip install imgtool
          west build --sysbuild -b rpi_pico/rp2040/w/mcuboot -d build_dfu_wifi -- \
            -Dzpsu_mon_CONFIG_PICO_DISPLAY_PACK2=y \
            -Dzpsu_mon_EXTRA_CONF_FILE="wifi.conf;dfu.conf" \
            -Dzpsu_mon_EXTRA_DTC_OVERLAY_FILE="boards/rpi_pico/pico_display_pack2.overlay;boards/rpi_pico/dfu_singleslot.dtsi" \
            -Dzpsu_mon_EXTRA_CFLAGS="-DOVP_SCALE_FACTOR=${{ github.event.inputs.ovp_scale_factor }}"
      - name: Delete existing release and tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # dev-drprasad/delete-tag-and-release has no Node24 release, so reset
          # the release/tag with the pre-installed (Node-free) gh CLI instead.
          gh release delete "${{ env.VERSION }}" --yes --cleanup-tag --repo "${{ github.repository }}" || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${{ env.VERSION }}" || true
      - name: Upload Release Zpsu PICO(RP2040) PICO Display Pack FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ inputs.text }}
          file: build_lcd1/zephyr/zephyr.uf2
          asset_name: zpsu_pico_pdp1.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
      - name: Upload Release Zpsu PICO(RP2040) PICO Display Pack2 FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ inputs.text }}
          file: build_lcd2/zephyr/zephyr.uf2
          asset_name: zpsu_pico_pdp2.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
      - name: Upload Release Zpsu PICO2(RP2350) PICO Display Pack FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ inputs.text }}
          file: build_lcd3/zephyr/zephyr.uf2
          asset_name: zpsu_pico2_pdp1.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
      - name: Upload Release Zpsu PICO2(RP2350) PICO Display Pack2 FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ steps.calc_text.outputs.text }}
          file: build_lcd4/zephyr/zephyr.uf2
          asset_name: zpsu_pico2_pdp2.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
      - name: Upload Release Zpsu PICO W(RP2040) WiFi STA FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ inputs.text }}
          file: build_wifi/zephyr/zephyr.uf2
          asset_name: zpsu_picow_wifi.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}
      - name: Upload Release Zpsu PICO W(RP2040) SoftAP FW
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}"
          release_name: "Release ${{ env.VERSION }}"
          body: ${{ inputs.text }}
          file: build_ap/zephyr/zephyr.uf2
          asset_name: zpsu_picow_ap.uf2
          overwrite: true
          prerelease: ${{ inputs.prerelease }}

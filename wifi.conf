# --- Pico W (RP2040) WiFi connectivity (opt-in fragment) ---
# Build:  west build -b rpi_pico/rp2040/w -d build_wifi -- \
#             -DCONFIG_PICO_DISPLAY_PACK2=y -DEXTRA_CONF_FILE=wifi.conf
# Requires: west blobs fetch hal_infineon  (one-time, in zephyrproject)
#
# Default rpi_pico / rpi_pico2 builds never include this file, so they are
# completely unaffected.

# Networking core: IPv4 + DHCP only. No TCP/IPv6 to save RP2040 RAM
# (the connectivity foundation needs only DHCP + ICMP).
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_MAX_CONTEXTS=6

# WiFi: the board defconfig already sets CONFIG_CYW43439=y and the board DT
# enables the AIROC driver; this turns on the WiFi management API.
CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_ERR=y

# Leave CONFIG_WIFI_INIT_PRIORITY at its default (80). The AIROC chip bring-up
# (airoc_init) MUST run before the net-if init (NET_INIT_PRIO=90), because the
# interface init reads the chip's MAC into the link address. Delaying WiFi init
# past 90 makes that MAC read fail -> link addr 00:00:00:00:00:00 -> DHCP never
# completes. (Default 80 < 90, so the MAC is ready in time.)

# Auto-connect at boot is handled in src/net/wifi_net.c: if a (gitignored)
# src/net/wifi_creds.h is present, it issues the WiFi connect at startup and
# retries on the transient first-join failure / on link drops. No credentials
# live in the committed tree.

# Interactive shell over the existing USB CDC ACM console (the chosen
# zephyr,shell-uart in the pack overlay). This target has NO J-Link, so route
# logs through the shell over USB-CDC (drop the SEGGER RTT backend) — that's
# the only console you can actually read here.
CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n

# net_mgmt event delivery (scan results are bursty).
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# Buffers / stacks — trimmed for RP2040. prj.conf sets MAIN_STACK_SIZE=2048;
# raise it here for the net stack. TRIM ORDER if the image overflows RAM:
#   1) (already done) NET_TCP=n, NET_IPV6=n
#   2) lower NET_PKT_* / NET_BUF_* counts
#   3) lower CONFIG_LV_Z_MEM_POOL_SIZE (add it here; do NOT edit prj.conf)
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=12
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SHELL_STACK_SIZE=3072
CONFIG_NET_TX_STACK_SIZE=1536
CONFIG_NET_RX_STACK_SIZE=1536

# Random source for DHCPv4 (XIDs / ephemeral ports). The RP2040 has no
# hardware entropy driver in Zephyr v4.2.1, so the entropy-based RNG choices
# are unavailable and sys_rand_get() would be undefined. Use the lightweight
# generator (non-cryptographic; fine for this use). Matches Zephyr's own
# samples/net/wifi/shell. A proper entropy source is a future enhancement.
CONFIG_TEST_RANDOM_GENERATOR=y

# RAM headroom for the WiFi build ONLY (default non-W build is unaffected).
# Diagnosis showed the device runs out of RAM once WiFi + the watchface + net
# buffers are all live (~98% used, ~5 KB free) -> heap/buffer corruption ->
# warm reset. Free static RAM by dropping LVGL's SECOND frame buffer
# (single-buffered; ~15 KB reclaimed — the DMA flush path still works, refresh
# is slightly less smooth), and give the object pool a bit more room than the
# earlier 72000 squeeze.
CONFIG_LV_Z_DOUBLE_VDB=n
CONFIG_LV_Z_MEM_POOL_SIZE=80000

# Quiet the repeated I2C error during bench WiFi testing (WiFi build ONLY; the
# default non-W production build keeps full I2C reporting). On the bench the
# PSU's I2C device (HP PL30) usually isn't attached, so the i2c_dw driver
# logs "IO Fail on i2c@40044000" on every poll — turn its log off.
CONFIG_I2C_LOG_LEVEL_OFF=y

# --- Persistent storage for runtime credentials (Settings -> NVS) ---
# Uses the storage_partition from boards/pico_w_storage.overlay.
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
